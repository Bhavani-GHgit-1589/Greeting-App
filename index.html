<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREETLY | Modern Personal Greeting App</title>
    <meta name="description" content="A modern, interactive greeting application with stunning animations and a premium user interface.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="animation-container"></div>
    
    <main class="container">
        <section class="card">
            <h1 class="title">GREETLY</h1>
            <div class="input-group">
                <label for="nameInput" id="label-name">Enter Your Name</label>
                <input type="text" id="nameInput" placeholder="Type your name here" autocomplete="off">
            </div>
            <button id="greetBtn" class="btn-primary">Greet</button>
            <div id="greetingDisplay" class="greeting-text"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
